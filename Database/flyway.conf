# ===========================================================================
# Flyway Configuration - WorknestDB
# ===========================================================================
# Documentation: https://documentation.red-gate.com/flyway/flyway-cli-and-api/configuration

# JDBC connection to local SQL Server (default instance, port 1433) using Windows Authentication
flyway.url=jdbc:sqlserver://localhost:1433;databaseName=WorknestDB;integratedSecurity=true;trustServerCertificate=true

# Windows Authentication is used (integratedSecurity=true),
# so flyway.user and flyway.password are NOT required.

# Location of migration scripts (relative to this config file's working dir)
flyway.locations=filesystem:./Migrations

# Schema to manage
flyway.defaultSchema=dbo

# The Flyway schema history table name
flyway.table=flyway_schema_history

# Encoding of SQL migrations
flyway.encoding=UTF-8

# Allow mixed migrations (both versioned and repeatable)
flyway.mixed=true
